<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <!-- Icon mark -->
  <rect width="48" height="48" rx="12" fill="url(#grad)"/>
  <!-- Roof peak -->
  <path d="M10 22 L24 10 L38 22" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Building body -->
  <rect x="14" y="22" width="20" height="16" rx="1" fill="white" opacity="0.2"/>
  <!-- Windows -->
  <rect x="17" y="25" width="5" height="5" rx="1" fill="white" opacity="0.85"/>
  <rect x="26" y="25" width="5" height="5" rx="1" fill="white" opacity="0.85"/>
  <!-- Door -->
  <rect x="20" y="31" width="8" height="7" rx="1" fill="white" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="60" y="30" font-family="'Inter', 'SF Pro Display', system-ui, sans-serif" font-size="18" font-weight="700" fill="#0F172A" letter-spacing="-0.5">GH Hostels</text>

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
</svg>
